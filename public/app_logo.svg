<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient for metallic look -->
    <linearGradient id="logo-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" />
      <stop offset="30%" stop-color="#EAB308" />
      <stop offset="70%" stop-color="#CA8A04" />
      <stop offset="100%" stop-color="#854D0E" />
    </linearGradient>
    <!-- Emerald Gradient for background -->
    <linearGradient id="logo-emerald-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#064E3B" />
      <stop offset="100%" stop-color="#022C22" />
    </linearGradient>
    <!-- Soft glow -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" opacity="0.8" operator="over" />
    </filter>
  </defs>

  <!-- Base Circle (Emerald) with Gold Border -->
  <circle cx="50" cy="50" r="46" fill="url(#logo-emerald-grad)" stroke="url(#logo-gold-grad)" stroke-width="2.5" />
  
  <!-- Outer Dotted Ring (Islamic/Premium detail) -->
  <circle cx="50" cy="50" r="41" stroke="url(#logo-gold-grad)" stroke-width="0.75" stroke-dasharray="3 3" opacity="0.8" />
  
  <!-- Inner Ring -->
  <circle cx="50" cy="50" r="38" stroke="url(#logo-gold-grad)" stroke-width="1" opacity="0.6" />

  <!-- Reem Kufi / Amiri Styled App Title inside the Logo -->
  <g filter="url(#logo-glow)">
    <text 
      x="50" 
      y="28" 
      fill="url(#logo-gold-grad)" 
      font-family="Cairo, Amiri, Tajawal, sans-serif" 
      font-size="7.5" 
      font-weight="900" 
      text-anchor="middle"
      letter-spacing="0.5"
    >
      جامع الفوائد
    </text>
    <!-- Calligraphic Decorative flourish line under the title -->
    <path d="M 33 32 Q 50 34.5 67 32" stroke="url(#logo-gold-grad)" stroke-width="0.75" stroke-linecap="round" fill="none" opacity="0.8" />
    
    <!-- Beautiful tiny diamond below title decoration -->
    <path d="M 49 33.5 L 50 32.5 L 51 33.5 L 50 34.5 Z" fill="url(#logo-gold-grad)" />
  </g>

  <!-- Symbolic Book & Quill Design -->
  <g transform="translate(0, 4)" filter="url(#logo-glow)">
    <!-- Elegant open book pages (Golden lines) -->
    <!-- Left page -->
    <path d="M 50 60 C 45 54, 31 54, 23 57 L 23 37 C 31 34, 45 34, 50 40" stroke="url(#logo-gold-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Right page -->
    <path d="M 50 60 C 55 54, 69 54, 77 57 L 77 37 C 69 34, 55 34, 50 40" stroke="url(#logo-gold-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Book binding spine -->
    <path d="M 50 40 L 50 61" stroke="url(#logo-gold-grad)" stroke-width="2" stroke-linecap="round" />

    <!-- Mini lines inside the left page to represent written wisdom -->
    <path d="M 28 43 H 41 M 27 47 H 42 M 29 51 H 39" stroke="url(#logo-gold-grad)" stroke-width="1" stroke-linecap="round" opacity="0.75" />
    
    <!-- Mini lines inside the right page -->
    <path d="M 59 43 H 72 M 58 47 H 73 M 61 51 H 71" stroke="url(#logo-gold-grad)" stroke-width="1" stroke-linecap="round" opacity="0.75" />

    <!-- Elegant Quill/Feather Pen crosswise -->
    <!-- Feather blade -->
    <path d="M 45 58 C 47 46, 58 33, 68 26 C 65 32, 59 46, 51 55 Z" fill="url(#logo-gold-grad)" opacity="0.95" />
    <!-- Feather shaft/quill line -->
    <path d="M 42 61 L 70 24" stroke="url(#logo-gold-grad)" stroke-width="1.75" stroke-linecap="round" />
    <!-- Pen Tip Ink Glow -->
    <circle cx="41.5" cy="61.5" r="1" fill="#FFF" />
  </g>

  <!-- Decorative Ornaments at the bottom -->
  <g filter="url(#logo-glow)">
    <path d="M 46 80 L 50 76.5 L 54 80 L 50 83.5 Z" fill="url(#logo-gold-grad)" opacity="0.85" />
    <line x1="38" y1="80" x2="43" y2="80" stroke="url(#logo-gold-grad)" stroke-width="0.75" stroke-linecap="round" opacity="0.6" />
    <line x1="57" y1="80" x2="62" y2="80" stroke="url(#logo-gold-grad)" stroke-width="0.75" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Glowing Stars/Sparkles to symbolize "الفوائد" (knowledge benefits) -->
  <!-- Left Star -->
  <path d="M 21 27 L 22 30 L 25 31 L 22 32 L 21 35 L 20 32 L 17 31 L 20 30 Z" fill="url(#logo-gold-grad)" opacity="0.8" />
  <!-- Right Star -->
  <path d="M 79 27 L 80 30 L 83 31 L 80 32 L 79 35 L 78 32 L 75 31 L 78 30 Z" fill="url(#logo-gold-grad)" opacity="0.8" />
</svg>
